<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrowave Racing</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
        }

        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #lives {
            font-size: 24px;
            color: #ff00ff;
        }

        #mute-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            display: none;
        }

        #game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        #high-scores {
            margin: 20px 0;
            text-align: left;
            display: inline-block;
        }

        #high-scores h2 {
            font-size: 20px;
            color: #ff00ff;
            text-align: center;
            margin-bottom: 10px;
        }

        .score-entry {
            font-size: 18px;
            margin: 5px 0;
            color: #00ffff;
        }

        button {
            background: transparent;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            font-size: 20px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
    </div>

    <button id="mute-toggle" onclick="toggleMusic()">Music: ON</button>

    <div id="game-over">
        <h1>Game Over</h1>
        <p id="final-score">Final Score: 0</p>
        <div id="high-scores">
            <h2>Top 3 Scores</h2>
            <div id="scores-list"></div>
        </div>
        <br>
        <button onclick="restartGame()">Restart</button>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Game Constants & State
        const CONFIG = {
            roadWidth: 20,
            roadLength: 1000,
            initialSpeed: 0.5,
            speedIncrement: 0.0001,
            maxSpeed: 2.0,
            obstacleSpawnRate: 0.02,
            enemySpawnRate: 0.01,
            movingObstacleChance: 0.3
        };

        let scene, camera, renderer, composer;
        let road, roadGrid, player;
        let obstacles = [];
        let scenery = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let invincibilityTime = 0;
        let lastTime = performance.now();
        let speed = CONFIG.initialSpeed;
        let isGameOver = false;
        let audioContext, mainOscillator, filter, gainNode;
        let isMuted = false;

        const keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false };

        function initAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();

                const playNote = (freq, time, duration, type = 'sawtooth', volume = 0.1, filterFreq = 400, resonance = 1) => {
                    const osc = audioContext.createOscillator();
                    const g = audioContext.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, time);

                    g.gain.setValueAtTime(volume, time);
                    g.gain.exponentialRampToValueAtTime(0.0001, time + duration);

                    const f = audioContext.createBiquadFilter();
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(filterFreq, time);
                    f.Q.setValueAtTime(resonance, time);

                    osc.connect(f);
                    f.connect(g);
                    g.connect(gainNode);

                    osc.start(time);
                    osc.stop(time + duration);
                };

                gainNode = audioContext.createGain();
                gainNode.gain.value = 0.5;
                gainNode.connect(audioContext.destination);

                let nextNoteTime = audioContext.currentTime;
                const bassSeq = [55, 55, 55, 55, 65.41, 65.41, 73.42, 82.41];
                const leadSeq = [220, 220, 246.94, 261.63, 329.63, 329.63, 293.66, 261.63];
                let index = 0;

                const scheduler = () => {
                    const intensity = Math.min(speed / CONFIG.maxSpeed, 1.0);
                    const filterCutoff = 400 + (intensity * 1500);
                    const resonance = 1 + (intensity * 5);
                    const tempo = 0.18 - (intensity * 0.04);

                    while (nextNoteTime < audioContext.currentTime + 0.1) {
                        // Driving Bass
                        playNote(bassSeq[index % bassSeq.length], nextNoteTime, tempo, 'sawtooth', 0.1, filterCutoff, resonance);

                        // Melodic Lead
                        if (index % 2 === 0) {
                            playNote(leadSeq[index % leadSeq.length], nextNoteTime, tempo * 2, 'square', 0.03, filterCutoff + 500, resonance);
                        }

                        nextNoteTime += tempo;
                        index++;
                    }
                    setTimeout(scheduler, 50);
                };

                scheduler();
            } catch (e) {
                console.error('AudioContext not supported');
            }
        }

        function toggleMusic() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-toggle');
            btn.innerText = isMuted ? 'Music: OFF' : 'Music: ON';
            if (gainNode) {
                gainNode.gain.value = isMuted ? 0 : 0.5;
            }
            if (!isMuted && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        window.toggleMusic = toggleMusic;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050005);
            scene.fog = new THREE.FogExp2(0x050005, 0.01);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 1, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Post-processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.1;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            createSun();
            createStars();
            createRoad();
            createScenery();
            createPlayer();
            
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousedown', () => {
                initAudio();
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            });

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                initAudio();
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            
            animate();
        }

        function createSun() {
            const sunGroup = new THREE.Group();
            
            // Retro sun with horizontal stripes
            const segments = 10;
            const radius = 50;
            for (let i = 0; i < segments; i++) {
                const height = (radius * 2) / segments;
                const y = -radius + i * height + height / 2;
                
                // Calculate width of the segment at this y
                const w = Math.sqrt(radius * radius - y * y) * 2;
                
                const geom = new THREE.PlaneGeometry(w, height * 0.8);
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(0.85 + (i / segments) * 0.1, 1, 0.5),
                    transparent: true,
                    opacity: 0.8
                });
                const stripe = new THREE.Mesh(geom, mat);
                stripe.position.y = y;
                sunGroup.add(stripe);
            }
            
            sunGroup.position.set(0, 15, -250);
            scene.add(sunGroup);

            // Large glow
            const glowGeom = new THREE.CircleGeometry(radius * 1.2, 64);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff0088,
                transparent: true,
                opacity: 0.15
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.set(0, 15, -251);
            scene.add(glow);
        }

        function createStars() {
            const starGeom = new THREE.BufferGeometry();
            const starCount = 1000;
            const starPositions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount; i++) {
                starPositions[i * 3] = (Math.random() - 0.5) * 1000;
                starPositions[i * 3 + 1] = Math.random() * 500;
                starPositions[i * 3 + 2] = (Math.random() - 0.5) * 1000;
            }

            starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
            const stars = new THREE.Points(starGeom, starMat);
            scene.add(stars);
        }

        function createRoad() {
            const roadGeom = new THREE.PlaneGeometry(CONFIG.roadWidth, CONFIG.roadLength, 20, 100);
            const roadMat = new THREE.MeshBasicMaterial({ color: 0x100010 });
            road = new THREE.Mesh(roadGeom, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -CONFIG.roadLength / 4;
            scene.add(road);

            const gridGeom = new THREE.PlaneGeometry(CONFIG.roadWidth, CONFIG.roadLength, 10, 50);
            const gridMat = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });
            roadGrid = new THREE.Mesh(gridGeom, gridMat);
            roadGrid.rotation.x = -Math.PI / 2;
            roadGrid.position.z = -CONFIG.roadLength / 4;
            roadGrid.position.y = 0.01; // Slightly above the road to avoid z-fighting
            scene.add(roadGrid);

            // Side lines
            const lineGeom = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-CONFIG.roadWidth / 2, 0.1, 0),
                new THREE.Vector3(-CONFIG.roadWidth / 2, 0.1, -CONFIG.roadLength)
            ]);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xff00ff });
            const leftLine = new THREE.Line(lineGeom, lineMat);
            scene.add(leftLine);

            const rightLine = new THREE.Line(lineGeom, lineMat);
            rightLine.position.x = CONFIG.roadWidth;
            scene.add(rightLine);
        }

        function updateRoad() {
            roadGrid.position.z += speed;
            const gridUnit = CONFIG.roadLength / 50; 
            if (roadGrid.position.z > -CONFIG.roadLength / 4 + gridUnit) {
                roadGrid.position.z -= gridUnit;
            }
        }

        function createScenery() {
            // Add some neon towers on the sides
            const towerGeom = new THREE.BoxGeometry(2, 20, 2);
            for (let i = 0; i < 20; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const towerMat = new THREE.MeshPhongMaterial({
                    color: 0x000000,
                    emissive: i % 3 === 0 ? 0xff00ff : 0x00ffff,
                    emissiveIntensity: 0.5
                });
                const tower = new THREE.Mesh(towerGeom, towerMat);
                tower.position.set(side * (CONFIG.roadWidth / 2 + 10 + Math.random() * 20), 10, -i * 50);
                scene.add(tower);
                scenery.push(tower);
            }
        }

        function updateScenery() {
            scenery.forEach(obj => {
                obj.position.z += speed;
                if (obj.position.z > 50) {
                    obj.position.z = -950;
                }
            });
        }

        function createPlayer() {
            const playerGroup = new THREE.Group();

            // Car body
            const bodyGeom = new THREE.BoxGeometry(1.2, 0.5, 2);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff00ff });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.4;
            playerGroup.add(body);

            // Car roof
            const roofGeom = new THREE.BoxGeometry(1, 0.4, 1);
            const roofMat = new THREE.MeshPhongMaterial({ color: 0x00ffff });
            const roof = new THREE.Mesh(roofGeom, roofMat);
            roof.position.y = 0.8;
            roof.position.z = 0.2;
            playerGroup.add(roof);

            // Wheels
            const wheelGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.2, 16);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            
            const wheelPositions = [
                [-0.6, 0.2, 0.7], [0.6, 0.2, 0.7],
                [-0.6, 0.2, -0.7], [0.6, 0.2, -0.7]
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeom, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                playerGroup.add(wheel);
            });

            // Headlights
            const lightGeom = new THREE.BoxGeometry(0.3, 0.1, 0.1);
            const lightMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const leftLight = new THREE.Mesh(lightGeom, lightMat);
            leftLight.position.set(-0.4, 0.4, -1);
            playerGroup.add(leftLight);

            const rightLight = new THREE.Mesh(lightGeom, lightMat);
            rightLight.position.set(0.4, 0.4, -1);
            playerGroup.add(rightLight);

            // Add point light for the headlights
            const pointLight = new THREE.PointLight(0x00ffff, 1, 10);
            pointLight.position.set(0, 0.5, -1);
            playerGroup.add(pointLight);

            player = playerGroup;
            scene.add(player);

            // Add ambient light to see the car
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(0, 10, 5);
            scene.add(directionalLight);
        }

        const obstacleGeom = new THREE.BoxGeometry(1, 1, 1);
        const obstacleMatCyan = new THREE.MeshPhongMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.7
        });
        const obstacleMatPink = new THREE.MeshPhongMaterial({
            color: 0xff00ff,
            emissive: 0xff00ff,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.7
        });

        // Enemy Car Assets
        const enemyBodyGeom = new THREE.BoxGeometry(1.2, 0.5, 2);
        const enemyRoofGeom = new THREE.BoxGeometry(1, 0.4, 1);
        const enemyWheelGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.2, 16);
        const enemyMatRed = new THREE.MeshPhongMaterial({ color: 0xff3300, emissive: 0xff0000, emissiveIntensity: 0.5 });
        const enemyMatYellow = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
        const enemyWheelMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

        function createObstacle() {
            // Difficulty scaling - capped for playability
            const spawnRate = Math.min(CONFIG.obstacleSpawnRate + (score / 200000), 0.1);
            if (Math.random() > spawnRate) return;

            const size = 1 + Math.random() * 2;
            const mat = Math.random() > 0.5 ? obstacleMatCyan : obstacleMatPink;
            const obstacle = new THREE.Mesh(obstacleGeom, mat);
            
            obstacle.scale.set(size, size, size);
            obstacle.position.x = (Math.random() - 0.5) * CONFIG.roadWidth;
            obstacle.position.y = size / 2;
            obstacle.position.z = -200;

            obstacle.userData = {
                type: 'obstacle',
                isMoving: Math.random() < CONFIG.movingObstacleChance,
                vx: (Math.random() - 0.5) * 0.2
            };
            
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function createEnemyCar() {
            // Difficulty scaling - capped for playability
            const spawnRate = Math.min(CONFIG.enemySpawnRate + (score / 400000), 0.05);
            if (Math.random() > spawnRate) return;

            const enemyGroup = new THREE.Group();
            const colorMat = Math.random() > 0.5 ? enemyMatRed : enemyMatYellow;

            const body = new THREE.Mesh(enemyBodyGeom, colorMat);
            body.position.y = 0.4;
            enemyGroup.add(body);

            const roof = new THREE.Mesh(enemyRoofGeom, obstacleMatCyan);
            roof.position.y = 0.8;
            roof.position.z = 0.2;
            enemyGroup.add(roof);

            const wheelPositions = [
                [-0.6, 0.2, 0.7], [0.6, 0.2, 0.7],
                [-0.6, 0.2, -0.7], [0.6, 0.2, -0.7]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(enemyWheelGeom, enemyWheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                enemyGroup.add(wheel);
            });

            // Random lane
            const lanes = [-6, 0, 6];
            enemyGroup.position.x = lanes[Math.floor(Math.random() * lanes.length)];
            enemyGroup.position.y = 0;
            enemyGroup.position.z = -250;

            enemyGroup.userData = {
                type: 'enemy',
                speed: 0.3 + (score / 50000) // Moves toward player
            };

            scene.add(enemyGroup);
            obstacles.push(enemyGroup);
        }

        const playerBox = new THREE.Box3();
        const obstacleBox = new THREE.Box3();

        function updateObstacles(deltaTime) {
            playerBox.setFromObject(player);
            const deltaScale = deltaTime * 60;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];

                // Base movement (relative to road)
                obstacle.position.z += speed * deltaScale;

                // Extra movement for specific hazards
                if (obstacle.userData.type === 'enemy') {
                    obstacle.position.z += obstacle.userData.speed * deltaScale;
                }
                if (obstacle.userData.isMoving) {
                    obstacle.position.x += obstacle.userData.vx * deltaScale;
                    if (Math.abs(obstacle.position.x) > CONFIG.roadWidth / 2 - 1) {
                        obstacle.userData.vx *= -1;
                    }
                }

                // Remove off-screen obstacles
                if (obstacle.position.z > 15) {
                    scene.remove(obstacle);
                    // Geometries and materials are shared/reused to prevent memory leaks.
                    // If they were unique, we would call .dispose() here.
                    obstacles.splice(i, 1);
                    continue;
                }

                // Simple distance check before expensive box collision
                const distZ = Math.abs(player.position.z - obstacle.position.z);
                if (distZ > 5) continue;

                const distX = Math.abs(player.position.x - obstacle.position.x);
                if (distX > 5) continue;

                if (invincibilityTime <= 0) {
                    obstacleBox.setFromObject(obstacle);

                    if (playerBox.intersectsBox(obstacleBox)) {
                        lives--;
                        document.getElementById('lives').innerText = `Lives: ${lives}`;
                        createExplosion(obstacle.position.x, obstacle.position.y, obstacle.position.z);

                        // Remove the obstacle that was hit
                        scene.remove(obstacle);
                        obstacles.splice(i, 1);

                        if (lives <= 0) {
                            gameOver();
                        } else {
                            invincibilityTime = 3; // Reduced to 3 seconds for better gameplay feel
                        }
                    }
                }
            }
        }

        function updateGame() {
            score += Math.floor(speed * 10);
            document.getElementById('score').innerText = `Score: ${score}`;
            
            if (speed < CONFIG.maxSpeed) {
                speed += CONFIG.speedIncrement;
            }
        }

        const particleGeom = new THREE.SphereGeometry(0.1, 8, 8);
        const particleMatCyan = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const particleMatPink = new THREE.MeshBasicMaterial({ color: 0xff00ff });

        function createExplosion(x, y, z) {
            const particleCount = 25; // Reduced count for performance
            
            for (let i = 0; i < particleCount; i++) {
                const mat = Math.random() > 0.5 ? particleMatCyan : particleMatPink;
                const particle = new THREE.Mesh(particleGeom, mat);
                particle.position.set(x, y, z);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                
                particles.push({ mesh: particle, velocity, life: 1.0 });
                scene.add(particle);
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.02;
                p.mesh.scale.setScalar(p.life);
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    // Don't dispose shared materials/geometries
                    particles.splice(i, 1);
                }
            }
        }

        function saveHighScore(newScore) {
            let highScores = JSON.parse(localStorage.getItem('retrowave_high_scores') || '[]');
            highScores.push(newScore);
            highScores.sort((a, b) => b - a);
            highScores = highScores.slice(0, 3);
            localStorage.setItem('retrowave_high_scores', JSON.stringify(highScores));
            return highScores;
        }

        function displayHighScores(scores) {
            const list = document.getElementById('scores-list');
            list.innerHTML = '';
            scores.forEach((s, i) => {
                const entry = document.createElement('div');
                entry.className = 'score-entry';
                entry.innerText = `${i + 1}. ${s}`;
                list.appendChild(entry);
            });
        }

        function gameOver() {
            isGameOver = true;
            createExplosion(player.position.x, player.position.y, player.position.z);
            
            const topScores = saveHighScore(score);

            // Allow some time for the explosion to show before stopping
            let frames = 0;
            const endAnimate = () => {
                if (frames > 100) {
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-score').innerText = `Final Score: ${score}`;
                    displayHighScores(topScores);
                    return;
                }
                frames++;
                updateParticles();
                composer.render();
                requestAnimationFrame(endAnimate);
            };
            endAnimate();
        }

        function updatePlayer(deltaTime) {
            const moveSpeed = 15 * deltaTime;
            if (keys.ArrowLeft || keys.KeyA) {
                player.position.x -= moveSpeed;
                player.rotation.z = Math.min(player.rotation.z + 2 * deltaTime, 0.1);
            } else if (keys.ArrowRight || keys.KeyD) {
                player.position.x += moveSpeed;
                player.rotation.z = Math.max(player.rotation.z - 2 * deltaTime, -0.1);
            } else {
                player.rotation.z *= Math.pow(0.9, deltaTime * 60);
            }

            // Clamp player position
            const limit = CONFIG.roadWidth / 2 - 1;
            player.position.x = Math.max(Math.min(player.position.x, limit), -limit);

            // Make camera follow player slightly
            camera.position.x = player.position.x * 0.5;
            camera.lookAt(player.position.x * 0.8, 1, -10);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateInvincibility(deltaTime) {
            if (invincibilityTime > 0) {
                invincibilityTime -= deltaTime;

                // Flickering effect
                player.visible = Math.floor(performance.now() / 150) % 2 === 0;

                if (invincibilityTime <= 0) {
                    player.visible = true;
                    invincibilityTime = 0;
                }
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            updateRoad();
            updateScenery();
            updatePlayer(deltaTime);
            updateInvincibility(deltaTime);
            createObstacle();
            createEnemyCar();
            updateGame();
            updateObstacles(deltaTime);
            updateParticles();

            composer.render();
        }

        function restartGame() {
            location.reload();
        }

        window.restartGame = restartGame;

        init();
    </script>
</body>
</html>
